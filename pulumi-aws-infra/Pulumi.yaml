import pulumi
import pulumi_aws as aws

# 1️⃣ VPC
vpc = aws.ec2.Vpc(
    "demo-vpc",
    cidr_block="10.0.0.0/16",
    enable_dns_support=True,
    enable_dns_hostnames=True,
    tags={"Name": "DemoVPC"}
)

# 2️⃣ Public Subnet
public_subnet = aws.ec2.Subnet(
    "public-subnet",
    vpc_id=vpc.id,
    cidr_block="10.0.1.0/24",
    map_public_ip_on_launch=True,
    tags={"Name": "PublicSubnet"}
)

# 3️⃣ Internet Gateway
igw = aws.ec2.InternetGateway(
    "demo-igw",
    vpc_id=vpc.id,
    tags={"Name": "DemoIGW"}
)

# 4️⃣ Route Table + Route
route_table = aws.ec2.RouteTable(
    "demo-route-table",
    vpc_id=vpc.id,
    routes=[
        aws.ec2.RouteTableRouteArgs(
            cidr_block="0.0.0.0/0",
            gateway_id=igw.id,
        )
    ],
    tags={"Name": "PublicRouteTable"}
)

# Associate Route Table to Subnet
route_table_assoc = aws.ec2.RouteTableAssociation(
    "public-route-assoc",
    subnet_id=public_subnet.id,
    route_table_id=route_table.id
)

# 5️⃣ Security Group
security_group = aws.ec2.SecurityGroup(
    "demo-sec-group",
    vpc_id=vpc.id,
    description="Allow SSH and HTTP",
    ingress=[
        aws.ec2.SecurityGroupIngressArgs(
            protocol="tcp",
            from_port=22,
            to_port=22,
            cidr_blocks=["0.0.0.0/0"]
        ),
        aws.ec2.SecurityGroupIngressArgs(
            protocol="tcp",
            from_port=80,
            to_port=80,
            cidr_blocks=["0.0.0.0/0"]
        ),
    ],
    egress=[
        aws.ec2.SecurityGroupEgressArgs(
            protocol="-1",
            from_port=0,
            to_port=0,
            cidr_blocks=["0.0.0.0/0"]
        )
    ],
    tags={"Name": "DemoSecurityGroup"}
)

# 6️⃣ S3 Bucket
bucket = aws.s3.Bucket(
    "demo-bucket",
    versioning=aws.s3.BucketVersioningArgs(enabled=True),
    tags={"Environment": "Demo", "Name": "PulumiBucket"}
)

# 7️⃣ IAM Role for EC2 (S3 Access)
iam_role = aws.iam.Role(
    "ec2-s3-role",
    assume_role_policy="""{
        "Version": "2012-10-17",
        "Statement": [
            {
                "Action": "sts:AssumeRole",
                "Principal": {"Service": "ec2.amazonaws.com"},
                "Effect": "Allow"
            }
        ]
    }"""
)

iam_policy_attach = aws.iam.RolePolicyAttachment(
    "attach-s3-policy",
    role=iam_role.name,
    policy_arn="arn:aws:iam::aws:policy/AmazonS3FullAccess"
)

# Instance profile for EC2
instance_profile = aws.iam.InstanceProfile(
    "ec2-instance-profile",
    role=iam_role.name
)

# 8️⃣ EC2 Instance
ami = aws.ec2.get_ami(
    most_recent=True,
    owners=["amazon"],
    filters=[aws.ec2.GetAmiFilterArgs(
        name="name",
        values=["amzn2-ami-hvm-*-x86_64-gp2"]
    )]
)

server = aws.ec2.Instance(
    "demo-ec2",
    instance_type="t2.micro",
    ami=ami.id,
    subnet_id=public_subnet.id,
    vpc_security_group_ids=[security_group.id],
    iam_instance_profile=instance_profile.name,
    tags={"Name": "PulumiDemoEC2"}
)

# 9️⃣ Outputs
pulumi.export("vpc_id", vpc.id)
pulumi.export("public_subnet_id", public_subnet.id)
pulumi.export("bucket_name", bucket.id)
pulumi.export("instance_public_ip", server.public_ip)
pulumi.export("instance_dns", server.public_dns)

