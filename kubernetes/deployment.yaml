apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: velayuthamgethu123/flask-app:v1.0
        imagePullPolicy: IfNotPresent  
          #        ports:
          #        - containerPort: 5000

